<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Maintenance</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #080810;
            color: #f0f0ff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        body::before {
            content: '';
            position: fixed;
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(124,58,237,0.12), transparent 70%);
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            pointer-events: none;
        }
        .card {
            position: relative;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px;
            padding: 60px 48px;
            max-width: 480px;
            width: 90%;
        }
        .icon {
            font-size: 64px;
            margin-bottom: 24px;
            animation: spin 3s linear infinite;
            display: inline-block;
        }
        @keyframes spin {
            0%   { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h1 {
            font-size: 28px;
            font-weight: 900;
            letter-spacing: -1px;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #fff 30%, #c4b5fd);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        p {
            font-size: 14px;
            color: #6b7280;
            line-height: 1.7;
            margin-bottom: 32px;
        }
        .status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 20px;
            background: rgba(245,158,11,0.1);
            border: 1px solid rgba(245,158,11,0.25);
            border-radius: 40px;
            font-size: 12px;
            font-weight: 700;
            color: #fbbf24;
        }
        .dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #f59e0b;
            animation: blink 1.5s infinite;
        }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

        /* Auto check every 10s if maintenance is off */
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">⚙️</div>
        <h1>Under Maintenance</h1>
        <p>We're currently performing scheduled maintenance.<br>We'll be back shortly. Thank you for your patience!</p>
        <div class="status"><div class="dot"></div> Maintenance in progress</div>
    </div>

    <script>
        // Auto redirect when maintenance is off
        setInterval(() => {
            fetch('/admin-maintenance/')
                .then(r => r.json())
                .then(d => { if (!d.maintenance) location.reload(); })
                .catch(() => {});
        }, 10000);
    </script>
</body>
</html>
